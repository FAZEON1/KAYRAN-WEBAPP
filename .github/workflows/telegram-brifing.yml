name: Telegram Sabah Brifingi

on:
  schedule:
    # Her gün 05:00 UTC = 08:00 Türkiye saati
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # Actions sekmesinden elle test için

jobs:
  brifing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install --quiet streamlit supabase requests pandas

      - name: Supabase erişimini hazırla (uygulamanın kendi secrets dosyası)
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml << SECRETS
          [supabase]
          url = "${{ secrets.SUPABASE_URL }}"
          key = "${{ secrets.SUPABASE_KEY }}"
          service_role_key = "${{ secrets.SUPABASE_KEY }}"
          SECRETS

      - name: Brifingi gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_brifing.py
